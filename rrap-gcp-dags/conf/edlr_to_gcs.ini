[global]
_enabled = True
schema = None
beeline_conn_id = edlr-conn
basedir = /bns/rrap/data
to_parquet = True
strings_can_be_null = True
bucket = rrap_data-staging-mrmc


[ifrs9.crz_ifrs9_rtl.ifrs9_acct_snapshot]
schema_name = crz_ifrs9_rtl
table_name = ifrs9_acct_snapshot
json_filter = {"proc_mth_id": "{{ task_instance.xcom_pull(task_ids='handle_month_context', key='rundate') | replace('-', '') }}"}
target = ${table_name}_{{ task_instance.xcom_pull(task_ids='handle_month_context', key='rundate') | replace('-', '') }}.parquet
prefix = ifrs9/edlr/${table_name}
rundir = ${global:basedir}/${prefix}
file_path = ${rundir}/${target}


